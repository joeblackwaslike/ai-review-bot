name: 'Claude Code Audit'
description: 'Run a full repository code audit with Claude AI and post findings as a GitHub issue'
author: 'Joe Black'
branding:
  icon: 'search'
  color: 'orange'

inputs:
  github-app-id:
    description: 'GitHub App ID'
    required: true
  github-app-private-key:
    description: 'GitHub App private key in PKCS#8 format (newlines escaped as \\n)'
    required: true
  anthropic-api-key:
    description: 'Anthropic API key (required when provider is anthropic)'
    required: false
    default: ''
  openai-api-key:
    description: 'OpenAI API key (required when provider is openai)'
    required: false
    default: ''
  provider:
    description: 'AI provider: anthropic (default) or openai'
    required: false
    default: 'anthropic'
  repo:
    description: 'Repository to audit (owner/repo). Defaults to the current repository.'
    required: false
    default: ''
  ref:
    description: 'Git ref to audit (branch, tag, or SHA). Defaults to the repo default branch.'
    required: false
    default: ''
  dry-run:
    description: "Set to 'true' to print the report to the job log instead of creating a GitHub issue."
    required: false
    default: 'false'
  extra:
    description: 'Additional instructions passed to the review agents.'
    required: false
    default: ''
  version:
    description: 'Version of ai-review-bot to use (e.g. latest, 0.1.0).'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Run code audit
      shell: bash
      env:
        GITHUB_APP_ID: ${{ inputs.github-app-id }}
        GITHUB_APP_PRIVATE_KEY: ${{ inputs.github-app-private-key }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        _AUDIT_REPO: ${{ inputs.repo || github.repository }}
        _AUDIT_REF: ${{ inputs.ref }}
        _AUDIT_EXTRA: ${{ inputs.extra }}
        _AUDIT_VERSION: ${{ inputs.version }}
        _AUDIT_DRY_RUN: ${{ inputs.dry-run }}
        _AUDIT_PROVIDER: ${{ inputs.provider }}
      run: |
        ARGS=("$_AUDIT_REPO")
        [[ -n "$_AUDIT_REF" ]]              && ARGS+=(--ref "$_AUDIT_REF")
        [[ "$_AUDIT_DRY_RUN" == "true" ]]    && ARGS+=(--dry-run)
        [[ -n "$_AUDIT_EXTRA" ]]             && ARGS+=(--extra "$_AUDIT_EXTRA")
        [[ "$_AUDIT_PROVIDER" != "anthropic" ]] && ARGS+=(--provider "$_AUDIT_PROVIDER")
        npx --yes "ai-review-bot@${_AUDIT_VERSION}" "${ARGS[@]}"
